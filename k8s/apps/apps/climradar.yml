apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: climradar
  namespace: argocd
  labels:
    app: climradar
spec:
  project: default
  source:
    path: k8s/apps/climradar
    repoURL: https://github.com/gastbob40/infrastructure.git

  destination:
    name: in-cluster
    namespace: climradar
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
